name: Coinjar
options:
  bundleIdPrefix: com.shimondeitel.coinjar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Coinjar:
    type: application
    platform: iOS
    sources:
      - path: Coinjar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coinjar
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Coinjar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CoinjarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CoinjarTests
      - path: Coinjar.storekit
    dependencies:
      - target: Coinjar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coinjar.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CoinjarUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CoinjarUITests
    dependencies:
      - target: Coinjar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coinjar.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Coinjar:
    build:
      targets:
        Coinjar: all
        CoinjarTests: [test]
        CoinjarUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Coinjar.storekit
    test:
      config: Debug
      storeKitConfiguration: Coinjar.storekit
      targets:
        - CoinjarTests
        - CoinjarUITests
    archive:
      config: Release
